name: Refresh Data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run refresh:data
